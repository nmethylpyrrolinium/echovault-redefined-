frontend:
  - 'index.html'
  - 'styles.css'
  - 'script.js'
  - 'wrapped-cinematic-module.js'

workflows:
  - '.github/workflows/**'

docs:
  - 'README.md'
  - 'LICENSE'

legacy-pages:
  - 'legacy-pages/**'
  - changed-files:
      - any-glob-to-any-file: ['index.html', 'styles.css']

logic:
  - changed-files:
      - any-glob-to-any-file: ['script.js']

cinematic:
  - changed-files:
      - any-glob-to-any-file: ['wrapped-cinematic-module.js', 'wrapped-cinematic.html']
